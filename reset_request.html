{% extends "layout.html" %}
{% block content %}

<div class="content_section">
    <h2>Forgot Password</h2>

    <form method="POST">
        {{ form.hidden_tag() }}

        <div>
            {{ form.email.label }}<br>
            {{ form.email(class="form-control") }}
        </div>

        <br>
        <div>
            {{ form.submit(class="btn btn-outline-info") }}
        </div>
    </form>
</div>

{% endblock %}
