{% else %}

</div></div>

    {% block content %}{% endblock %}

    <footer class="down">© 2026 NGO Locator Project</footer>
<script>

let recognition;

function startAssistant() {

    if (!('webkitSpeechRecognition' in window)) {
        alert("Speech recognition not supported in this browser");
        return;
    }

    recognition = new webkitSpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = "en-IN";
    recognition.maxAlternatives = 1;

    recognition.onstart = function () {
        document.getElementById("voiceStatus").innerText = 
            "🎤 Listening... Say district and need (Example: Chennai food)";
        document.getElementById("voiceWave").classList.add("active");
    };

    recognition.onresult = function (event) {

        let transcript = event.results[0][0].transcript.toLowerCase().trim();

        document.getElementById("voiceStatus").innerText =
            "You said: " + transcript;

        // ✅ Districts with aliases
        const districts = {
            "chennai": ["chennai", "madras"],
            "madurai": ["madurai"],
            "coimbatore": ["coimbatore", "kovai"],
            "tiruchirappalli": ["tiruchirappalli", "trichy"],
            "vellore": ["vellore"]
        };

        let foundDistrict = null;

        // Detect district
        for (let key in districts) {
            districts[key].forEach(function(name) {
                if (transcript.includes(name)) {
                    foundDistrict = key;
                }
            });
        }

        if (!foundDistrict) {
            document.getElementById("voiceStatus").innerText =
                "❌ District not recognized. Try again.";
            return;
        }

        // Set district input
        document.getElementById("district").value = foundDistrict;

        // Remove all district words from transcript
        for (let key in districts) {
            districts[key].forEach(function(name) {
                transcript = transcript.replace(name, "");
            });
        }

        let needs = transcript.trim();

        if (needs.length === 0) {
            document.getElementById("voiceStatus").innerText =
                "⚠ Please also say what help you need. Example: Chennai food";
            return;
        }

        // Set needs input
        document.getElementById("needs").value = needs;

        document.getElementById("voiceStatus").innerText =
            "✅ Searching NGOs for " + foundDistrict + " - " + needs;

        // Auto submit form
        setTimeout(function () {
            document.querySelector("form").submit();
        }, 1000);
    };

    recognition.onerror = function (event) {
        document.getElementById("voiceStatus").innerText =
            "Error: " + event.error + ". Please try again.";
        document.getElementById("voiceWave").classList.remove("active");
    };

    recognition.onend = function () {
        document.getElementById("voiceWave").classList.remove("active");
    };

    recognition.start();
}

</script>

<button onclick="startAssistant()" class="voice-float">🎤</button>
<!-- <button onclick="startAssistant()" class="voice-btn">🎤</button> -->

<div id="voiceWave" class="wave">
    
    <span></span>
    <span></span>
    <span></span>

</div>
<p id="voiceStatus"></p>
</body>
</html>
