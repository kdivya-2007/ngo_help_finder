<!DOCTYPE html>
<html>
<head>
    
   <link rel="icon" href="{{url_for('static',filename='images/ngo.png')}}">  
   <title>  VOLUNTEER ASSISTANCE &NGO LOCATOR PLATFORM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body class="{% block body_class %}{% endblock %}">
    
<div class="container">
    <div class="logo-title">
    <img src="{{url_for('static',filename='images/pic.png')}}" alt="" class="ig">
    <h1>NGO LOCATOR</h1>
    </div>
    <div class="links">
    <a href="{{url_for('home')}}">Home</a>
    
    {% if current_user.is_authenticated %}
     
    {% if current_user.is_admin %}
        <a href="{{url_for('ngo_details')}}">Admin Dashboard</a>
        <a href="{{url_for('add_ngo')}}">Add NGO</a>
        <!-- <a href="{{url_for('ngo_details')}}">NGO DETAILS</a> -->

    {% endif %}

    <a href="{{url_for('logout')}}">Logout</a>

{% else %}
    <a href="{{url_for('login')}}">Login</a>
    <a href="{{url_for('register')}}">Register</a>
{% endif %}
</div></div>

    {% block content %}{% endblock %}

    <footer class="down">© 2026 NGO Locator Project</footer>
<script>

let recognition;

function startAssistant() {

    if (!('webkitSpeechRecognition' in window)) {
        alert("Speech recognition not supported in this browser");
        return;
    }

    recognition = new webkitSpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.lang = "en-IN";
    recognition.maxAlternatives = 1;

    recognition.onstart = function () {
        document.getElementById("voiceStatus").innerText = 
            "🎤 Listening... Say district and need (Example: Chennai food)";
        document.getElementById("voiceWave").classList.add("active");
    };

    recognition.onresult = function (event) {

    let transcript = event.results[0][0].transcript.toLowerCase().trim();

    document.getElementById("voiceStatus").innerText =
        "You said: " + transcript;

    //  Districts with aliases
    
    const districts = {
        "chennai": ["chennai", "madras"],
        "madurai": ["madurai"],
        "coimbatore": ["coimbatore", "kovai"],
        "tiruchirappalli": ["tiruchirappalli", "trichy"],
        "vellore": ["vellore"]
    };

    let foundDistrict = null;

    for (let key in districts) {
        districts[key].forEach(function(name) {
            if (transcript.includes(name)) {
                foundDistrict = key;
            }
        });
    }

    if (!foundDistrict) {
        document.getElementById("voiceStatus").innerText =
            "❌ District not recognized. Try again.";
        return;
    }


    // Remove district words
    
    for (let key in districts) {
        districts[key].forEach(function(name) {
            transcript = transcript.replace(name, "");
        });
    }

    // Remove common filler words
    transcript = transcript
        .replace("in", "")
        .replace("for", "")
        .replace("need", "")
        .replace("help", "")
        .trim();

    let needs = "";

    // Map needs properly

    if (transcript.includes("food")) {
        needs = "Food";
    } 
    else if (transcript.includes("medical") || transcript.includes("hospital") || transcript.includes("clinic")) {
        needs = "Medical";
    } 
    else if (transcript.includes("education") || transcript.includes("school")) {
        needs = "Education";
    } 
    else if (transcript.includes("women")) {
        needs = "Women";
    } 
    else if (transcript.includes("child") || transcript.includes("orphan")) {
        needs = "Child";
    }

    if (!needs) {
        document.getElementById("voiceStatus").innerText =
            "⚠ Need not recognized. Say: food, medical, education etc.";
        return;
    }

    // Set inputs
   
    document.getElementById("district").value = foundDistrict;
    document.getElementById("needs").value = needs;

    document.getElementById("voiceStatus").innerText =
        "✅ Searching NGOs for " + foundDistrict + " - " + needs;

    
// Get Location + Submit

if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(function(position) {

        document.getElementById("latitude").value = position.coords.latitude;
        document.getElementById("longitude").value = position.coords.longitude;

        document.getElementById("voiceStatus").innerText =
            "📍 Location detected. Searching nearby NGOs...";

        setTimeout(function () {
           document.getElementById("searchForm").submit();
        }, 1000);

    }, function() {
        document.getElementById("voiceStatus").innerText =
            "⚠ Location permission denied. Showing normal results.";
document.getElementById("searchForm").submit();
    });

} else {
   document.getElementById("searchForm").submit();
}
};
    recognition.onerror = function (event) {
        document.getElementById("voiceStatus").innerText =
            "Error: " + event.error + ". Please try again.";
        document.getElementById("voiceWave").classList.remove("active");
    };

    recognition.onend = function () {
        document.getElementById("voiceWave").classList.remove("active");
    };

    recognition.start();
}

</script>

<button onclick="startAssistant()" class="voice-float">🎤</button>
<!-- <button onclick="startAssistant()" class="voice-btn">🎤</button> -->

<div id="voiceWave" class="wave">
    
    <span></span>
    <span></span>
    <span></span>

</div>
<p id="voiceStatus"></p>
</body>
</html>
